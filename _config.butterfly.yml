  category_id: "DIC_kwDORd9rw84C3zdK"
  theme: light
  light_theme: light
  dark_theme: dark

# ==========================================
# 脚本注入 (Inject) - 用于挂载次世代看板娘 + AI大脑
# ==========================================
inject:
  head:
    - <style>#chat-btn {position:fixed; bottom:30px; right:280px; z-index:9999; padding:10px 18px; background:#49b1f5; color:#fff; border-radius:30px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-size:14px; font-weight:bold; transition:all 0.3s;} #chat-btn:hover {background:#ff7242; transform:scale(1.05);}</style>
  bottom:
    - <script src="https://cdn.jsdelivr.net/npm/oh-my-live2d/dist/index.min.js"></script>
    - |
      <script>
        // 1. 初始化看板娘实例 (同步返回)
        const oml2d = OML2D.loadOml2d({
          sayHello: false,
          libraryUrls: {
            cubism2: 'https://fastly.jsdelivr.net/gh/oh-my-live2d/oh-my-live2d@main/lib/live2d.min.js',
            cubism5: 'https://fastly.jsdelivr.net/gh/oh-my-live2d/oh-my-live2d@main/lib/live2dcubismcore.min.js'
          },
          models: [
            {
              path: 'https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model/Live2D/Senko_Normals/senko.model3.json',
              position: [-50, 50],
              scale: 0.12,
              stageStyle: { width: 320 }
            }
          ],
          tips: {
            message: ['欢迎来到七月的峰の数字自留地！', '遇到Bug不要慌，先喝口水~', '思考，编码，与世界交手。']
          }
        });

        // 2. 动态创建聊天按钮
        const chatBtn = document.createElement('div');
        chatBtn.id = 'chat-btn';
        chatBtn.innerText = '💬 呼叫仙狐大人';
        document.body.appendChild(chatBtn);

        // 气泡安全调用函数
        const safeShowMsg = (msg) => {
          if (oml2d && oml2d.tipsMessage) oml2d.tipsMessage(msg, 8000, 10);
          else if (oml2d && oml2d.tips && oml2d.tips.showMessage) oml2d.tips.showMessage(msg, 8000, 10);
          else alert("仙狐大人说：" + msg);
        };

        // 3. 绑定点击发送给 DeepSeek
        chatBtn.onclick = async () => {
          const userMsg = prompt("你想对仙狐大人说什么？");
          if (!userMsg) return;

          safeShowMsg('仙狐正在动用全部脑细胞思考中...');
          
          try {
            const res = await fetch('https://senko-ai-proxy.htklyf123.workers.dev', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ message: userMsg })
            });
            
            const data = await res.json();
            
            if (data.reply) {
              safeShowMsg(data.reply);
            } else {
              safeShowMsg('糟糕，脑电波被外星人拦截了...');
            }
          } catch(e) {
            safeShowMsg('网络似乎被大风刮断了，连不上服务器呀~');
          }
        };
      </script>