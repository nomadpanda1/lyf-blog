# 首页全屏大图 (指向你刚才放进去的图片)
index_img: /img/bg.jpg

# 头像设置
avatar:
  img: /img/avatar.jpg

# 社交链接 (修改为你的专属链接)
social:
  fab fa-github: https://github.com/nomadpanda1 || GitHub
  fas fa-envelope: mailto:863088821@qq.com || Email

# ==========================================
# 导航栏 (Menu)
# ==========================================
menu:
  首页: / || fas fa-home
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于我: /about/ || fas fa-heart

# ==========================================
# 主页打字机特效 (Subtitle)
# ==========================================
subtitle:
  enable: true
  # Typewriter Effect (打字机特效)
  effect: true
  # 每次打字的停顿时间
  timeStep: 50
  # 停留时间
  startDelay: 300
  # 是否循环
  loop: true
  # 打字机循环的文案
  sub:
    - 思考，编码，与世界交手
    - 去体验那种荒谬，去穷尽这毫无指望的一生。
    - 真正的救赎，并不是厮杀后的胜利，而是能在苦难之中找到生的力量和心的安宁。

# ==========================================
# 侧边栏公告板 (Announcement)
# ==========================================
card_announcement:
  enable: true
  content: 欢迎来到我的数字自留地！目前正在西南石油大学修读电气工程及其自动化，持续更新关于技术、自动化与哲学的思考记录。

# ==========================================
# 评论系统 (Comments)
# ==========================================
comments:
  # 开启 Giscus 评论
  use: 
    - Giscus
  text: true
  lazyload: true

giscus:
  repo: nomadpanda1/lyf-blog
  repo_id: "R_kgDORd9rww"
  category: Announcements
  category_id: "DIC_kwDORd9rw84C3zdK"
  theme: light
  light_theme: light
  dark_theme: dark

# ==========================================
# 脚本注入 (Inject) - 用于挂载次世代看板娘
# ==========================================
inject:
  head:
  bottom:
    # 1. 核心引擎换用国内知乎的高速缓存节点
    - <script src="https://unpkg.zhimg.com/oh-my-live2d@latest"></script>
    - |
      <script>
        OML2D.loadOml2d({
          models: [
            {
              // 2. 模型文件换用国内专属的 GitHub 极速镜像源
              path: 'https://cdn.jsdmirror.com/gh/OML2D-Models/HK416-1-normal@latest/model.json',
              position: [-10, 20],
              scale: 0.08,
              stageStyle: { width: 250 }
            }
          ],
          tips: {
            message: ['欢迎来到七月的峰の数字自留地！', '今天学 PLC 还是打《战争雷霆》？', '思考，编码，与世界交手。']
          }
        });
      </script>