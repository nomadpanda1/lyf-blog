# 首页全屏大图
index_img: /img/bg.jpg

# 头像设置
avatar:
  img: /img/avatar.jpg

# 社交链接
social:
  fab fa-github: https://github.com/nomadpanda1 || GitHub
  fas fa-envelope: mailto:863088821@qq.com || Email

# ==========================================
# 核心防墙：强制切换至 Fastly，修复 Pjax 与粒子崩溃
# ==========================================
CDN:
  internal_provider: local
  third_party_provider: custom
  custom_format: 'https://fastly.jsdelivr.net/npm/${npm_name}@${version}/${file}'

# ==========================================
# 引擎超频：Pjax 无缝加载
# ==========================================
pjax:
  enable: true

# ==========================================
# 极客美学：Mac风格代码块 & 顶部阅读进度条
# ==========================================
highlight_theme: mac
code_mac_copy: true
progress_bar: true

# ==========================================
# 导航栏
# ==========================================
menu:
  首页: / || fas fa-home
  灵感(Bber): /bber/ || fas fa-comment-dots
  归档: /archives/ || fas fa-archive
  标签: /tags/ || fas fa-tags
  分类: /categories/ || fas fa-folder-open
  关于我: /about/ || fas fa-heart

# ==========================================
# 昼夜交替 (暗黑模式开关)
# ==========================================
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# ==========================================
# 主页打字机特效
# ==========================================
subtitle:
  enable: true
  effect: true
  timeStep: 50
  startDelay: 300
  loop: true
  sub:
    - 思考，编码，与世界交手
    - 去体验那种荒谬，去穷尽这毫无指望的一生。
    - 真正的救赎，并不是厮杀后的胜利，而是能在苦难之中找到生的力量和心的安宁。

# ==========================================
# 侧边栏公告板
# ==========================================
card_announcement:
  enable: true
  content: 欢迎来到我的数字自留地！持续更新关于Web开发、自动化与荒诞派哲学的思考记录。

# ==========================================
# 评论系统
# ==========================================
comments:
  use: 
    - Giscus
  text: true
  lazyload: true

giscus:
  repo: nomadpanda1/lyf-blog
  repo_id: "R_kgDORd9rww"
  category: Announcements
  category_id: "DIC_kwDORd9rw84C3zdK"
  theme: light
  light_theme: light
  dark_theme: dark

# ==========================================
# 脚本注入 - 满级赛博堡垒大圆满版
# ==========================================
inject:
  head:
    - '<link rel="stylesheet" href="https://lf26-cdn-tos.bytecdntp.com/cdn/expire_1-y/font-awesome/6.0.0/css/all.min.css">'
    - '<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.css">'
    - '<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/github-calendar@2.3.3/dist/github-calendar-responsive.css">'
    - |
      <style>
        /* 🖱️ 1. 极客鼠标指针 (系统底层十字准星，绝对生效) */
        html, body { cursor: crosshair !important; }
        a, img, button, input, textarea, #chat-btn, .chat-action-btn, #oml2d-stage { cursor: pointer !important; }
        
        /* 看板娘与聊天框样式 */
        #oml2d-stage { left: auto !important; right: 20px !important; bottom: 0 !important; transition: opacity 0.5s ease, visibility 0.5s ease !important; }
        #chat-btn {position:fixed; bottom:30px; right:330px; z-index:9999; padding:10px 18px; background:#49b1f5; color:#fff; border-radius:30px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-size:14px; font-weight:bold; transition:all 0.3s;}
        #chat-btn:hover {background:#ff7242; transform:scale(1.05);}
        #chat-box {position:fixed; bottom:80px; right:330px; z-index:9998; background:rgba(255,255,255,0.85); padding:15px; border-radius:15px; box-shadow:0 8px 16px rgba(0,0,0,0.15); display:none; flex-direction:column; gap:10px; backdrop-filter:blur(10px); width:280px; border: 1px solid rgba(255,255,255,0.6);}
        #chat-input {width:100%; border:1px solid #ddd; padding:10px; border-radius:8px; outline:none; font-size:14px; box-sizing:border-box; background:rgba(255,255,255,0.9);}
        #chat-input:focus {border-color:#49b1f5;}
        .chat-action-btn {flex:1; border:none; padding:8px; border-radius:8px; cursor:pointer; font-weight:bold; transition:all 0.3s; color:white;}
        #chat-submit {background:#49b1f5;} #chat-submit:hover {background:#ff7242;}
        #chat-close-btn {background:#ff4d4f;} #chat-close-btn:hover {background:#cf1322;}
        
        /* AI 摘要样式 */
        #ai-abs-box { background: rgba(73,177,245,0.05); border: 1px solid #49b1f5; border-radius: 8px; padding: 15px; margin-bottom: 20px; font-size: 14px; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .ai-title { font-weight: bold; color: #49b1f5; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .ai-content { color: #555; line-height: 1.6; min-height: 22px;}
        [data-theme="dark"] .ai-content { color: #ccc; }

        /* 📊 3. GitHub 热力图卡片自适应修复 */
        .gh-calendar-wrapper { width: 100%; overflow-x: auto; margin-top: 15px; }
        .calendar { min-width: 650px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 12px; }
        [data-theme="dark"] .ContributionCalendar-day[data-level="0"] { fill: #2d333b; }
      </style>
  bottom:
    - '<script src="https://fastly.jsdelivr.net/npm/canvas-nest.js@2.0.4/dist/canvas-nest.js" color="73,177,245" opacity="0.8" zIndex="1" count="99"></script>'
    - '<script src="https://fastly.jsdelivr.net/npm/aplayer@1.10.1/dist/APlayer.min.js"></script>'
    - '<script src="https://fastly.jsdelivr.net/npm/oh-my-live2d@0.19.3/dist/index.min.js"></script>'
    - '<script src="https://fastly.jsdelivr.net/npm/github-calendar@2.3.3/dist/github-calendar.min.js"></script>'
    - '<script src="https://fastly.jsdelivr.net/npm/tagcanvas@2.9.0/tagcanvas.min.js"></script>'
    - |
      <script>
        // 💥 1. 点击爆炸特效
        const initExplosion = () => {
          if(window.explosion_loaded) return;
          window.explosion_loaded = true;
          const words = ["荒诞", "反抗", "自由", "推石头", "Bug", "赛博", "Existentialism"];
          let clickIndex = 0;
          document.addEventListener('click', (e) => {
            const span = document.createElement('span');
            span.innerText = words[clickIndex];
            clickIndex = (clickIndex + 1) % words.length;
            span.style.position = 'fixed'; span.style.left = e.clientX + 'px'; span.style.top = e.clientY + 'px';
            span.style.color = `hsl(${Math.random() * 360}, 70%, 60%)`; span.style.fontWeight = 'bold';
            span.style.pointerEvents = 'none'; span.style.zIndex = '99999'; span.style.transition = 'all 1s ease-out';
            document.body.appendChild(span);
            requestAnimationFrame(() => { span.style.transform = `translateY(-50px) scale(1.5)`; span.style.opacity = '0'; });
            setTimeout(() => span.remove(), 1000);
          });
        };

        // 🟩 2. 全息 3D 标签云 
        const initTagCloud = () => {
          const tagCloud = document.querySelector('.tag-cloud-list') || document.querySelector('.tag-cloud-tags');
          if (tagCloud && !document.getElementById('tag-canvas')) {
            const tags = tagCloud.querySelectorAll('a');
            if(tags.length === 0) return; // 如果没有标签则不渲染
            tagCloud.id = 'tag-cloud-list-id'; tagCloud.style.display = 'none';
            const canvas = document.createElement('canvas'); canvas.id = 'tag-canvas';
            canvas.width = tagCloud.parentElement.offsetWidth || 300; canvas.height = canvas.width * 0.75;
            tagCloud.parentElement.appendChild(canvas);
            if(typeof TagCanvas !== 'undefined') {
              try { TagCanvas.Start('tag-canvas', 'tag-cloud-list-id', { textColour: '#49b1f5', outlineColour: 'transparent', reverse: true, depth: 0.8, maxSpeed: 0.05, weight: true, zoom: 1.1 }); } catch(e) {}
            }
          }
        };

        // 📊 3. GitHub 热力图日历 (卡片级完美镶嵌版)
        const initGitHubCalendar = () => {
          // 【严格限制】只在博客首页运行！绝不污染标签页和文章页
          if (location.pathname !== '/' && location.pathname !== '/index.html') return;
          const recentPosts = document.getElementById('recent-posts');
          if (recentPosts && !document.getElementById('github-calendar-card')) {
            const card = document.createElement('div');
            // 使用主题原生的卡片样式，完美融入排版
            card.className = 'recent-post-item'; 
            card.id = 'github-calendar-card';
            card.style.padding = '24px';
            card.style.width = '100%';
            card.style.boxSizing = 'border-box';
            card.innerHTML = `<div style="font-weight:bold; color:#49b1f5; font-size:1.1rem; margin-bottom:10px;"><i class="fab fa-github"></i> GitHub 推石头记录</div><div class="gh-calendar-wrapper"><div class="calendar">正在读取推石头数据...</div></div>`;
            recentPosts.insertBefore(card, recentPosts.firstChild);
            if(typeof GitHubCalendar !== 'undefined') {
                GitHubCalendar(".calendar", "nomadpanda1", { responsive: true }).catch(()=>{});
            }
          }
        };

        // 🤖 AI 智能摘要
        const initAIAbs = () => {
          const postHeader = document.querySelector('#post');
          if(!postHeader || document.getElementById('ai-abs-box')) return;
          const content = document.querySelector('.post-content');
          if(!content) return;
          const rawText = content.innerText.replace(/\s+/g, ' ').substring(0, 150) + '...';
          const box = document.createElement('div');
          box.id = 'ai-abs-box';
          box.innerHTML = `<div class="ai-title">🤖 赛博仙狐的脑内运算摘要</div><div class="ai-content"></div>`;
          postHeader.insertBefore(box, postHeader.firstChild);
          let i = 0;
          const typeWriter = setInterval(() => {
            if(i < rawText.length) { box.querySelector('.ai-content').innerHTML += rawText.charAt(i); i++; } 
            else { clearInterval(typeWriter); }
          }, 30);
        };

        // 🎵 原生东方曲播放器
        const initAudio = () => {
          if(document.getElementById('aplayer-container') || typeof APlayer === 'undefined') return;
          const apContainer = document.createElement('div');
          apContainer.id = 'aplayer-container';
          document.body.appendChild(apContainer);
          
          window.apInstance = new APlayer({
            container: document.getElementById('aplayer-container'),
            fixed: true, autoplay: true,
            audio: [{
              name: 'Bad Apple!!', artist: 'ZUN / Nomico',
              url: 'https://fastly.jsdelivr.net/gh/kasuganosoras/BadApple@master/badapple.mp3',
              cover: '/img/avatar.jpg'
            }]
          });
          document.addEventListener('click', () => {
            if(window.apInstance && window.apInstance.audio.paused) window.apInstance.play();
          }, { once: true });
        };

        // 🦊 仙狐大人与触觉系统
        const initOML2D = () => {
          if(window.oml2d_loaded || typeof OML2D === 'undefined') return;
          window.oml2d_loaded = true;
          const oml2d = OML2D.loadOml2d({
            sayHello: false, menus: { disable: true }, statusBar: { disable: true },
            libraryUrls: {
              cubism2: 'https://fastly.jsdelivr.net/gh/oh-my-live2d/oh-my-live2d@main/lib/live2d.min.js',
              cubism5: 'https://fastly.jsdelivr.net/gh/oh-my-live2d/oh-my-live2d@main/lib/live2dcubismcore.min.js'
            },
            models: [{
              path: 'https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model@master/Live2D/Senko_Normals/senko.model3.json',
              position: [0, 50], scale: 0.12, stageStyle: { width: 320 }
            }],
            tips: {
              style: { width: '240px', minHeight: '70px', padding: '14px', fontSize: '14px', lineHeight: '1.6', wordBreak: 'break-word' },
              message: ['欢迎来到七月的峰の数字自留地！', '代码跑不通？不如去打把《战争雷霆》。', '推石头的西西弗斯，今天也要加油哦！']
            }
          });

          const chatBtn = document.createElement('div');
          chatBtn.id = 'chat-btn'; chatBtn.innerText = '💬 呼叫仙狐大人';
          document.body.appendChild(chatBtn);

          const chatBox = document.createElement('div');
          chatBox.id = 'chat-box';
          chatBox.innerHTML = `
            <input type="text" id="chat-input" placeholder="想聊点什么？(按回车发送)" autocomplete="off"/>
            <div style="display:flex; gap:10px; margin-top:5px;">
              <button id="chat-submit" class="chat-action-btn">发送 🚀</button>
              <button id="chat-close-btn" class="chat-action-btn">💤 仙狐休息</button>
            </div>
          `;
          document.body.appendChild(chatBox);

          const inputField = document.getElementById('chat-input');
          const submitBtn = document.getElementById('chat-submit');
          const closeBtn = document.getElementById('chat-close-btn');

          const safeShowMsg = (msg) => {
            if (oml2d && oml2d.tipsMessage) oml2d.tipsMessage(msg, 10000, 10);
            else if (oml2d && oml2d.tips && oml2d.tips.showMessage) oml2d.tips.showMessage(msg, 10000, 10);
          };

          const speakText = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN'; msg.rate = 1.15; msg.pitch = 1.5; 
            const voices = window.speechSynthesis.getVoices();
            const loliVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Xiaoyi') || v.name.includes('童') || v.name.includes('girl'))) 
                           || voices.find(v => v.lang.includes('zh') && (v.name.includes('Xiaoxiao') || v.name.includes('女') || v.name.includes('Female')));
            if (loliVoice) msg.voice = loliVoice;
            window.speechSynthesis.speak(msg);
          };

          window.speechSynthesis.getVoices();

          document.addEventListener('click', (e) => {
            const stage = document.getElementById('oml2d-stage');
            if (stage && (e.target === stage || stage.contains(e.target))) {
              const touchQuotes = ["哎呀，别乱戳啦！脑电波要短路了！", "摸摸头~ 今天修Bug辛苦啦！", "检测到不明物理接触！防御系统启动！", "西西弗斯的石头可不是用来砸我的！", "正在进行高精度电磁场结算，请勿打扰~", "再戳我，我就去拔你服务器的网线！"];
              const randomQuote = touchQuotes[Math.floor(Math.random() * touchQuotes.length)];
              safeShowMsg(randomQuote); speakText(randomQuote);
            }
          });

          chatBtn.onclick = () => {
            if (chatBox.style.display === 'flex') chatBox.style.display = 'none';
            else { chatBox.style.display = 'flex'; inputField.focus(); }
          };

          closeBtn.onclick = () => {
            const stage = document.getElementById('oml2d-stage');
            if(stage) {
              if(stage.style.opacity === '0') {
                stage.style.opacity = '1'; stage.style.pointerEvents = 'auto'; stage.style.visibility = 'visible';
                closeBtn.innerText = '💤 仙狐休息'; safeShowMsg('我睡醒啦！');
              } else {
                stage.style.opacity = '0'; stage.style.pointerEvents = 'none'; stage.style.visibility = 'hidden';
                closeBtn.innerText = '🦊 唤醒仙狐';
              }
            }
          };

          const sendMessage = async () => {
            const userMsg = inputField.value.trim();
            if (!userMsg) return;
            inputField.value = ''; chatBox.style.display = 'none';
            safeShowMsg('仙狐正在脑内运算中...🦊');
            try {
              const res = await fetch('https://senko-ai-proxy.htklyf123.workers.dev', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMsg })
              });
              const data = await res.json();
              if (data.reply) { safeShowMsg(data.reply); speakText(data.reply); } 
              else safeShowMsg('糟糕，脑电波被外星人拦截了...');
            } catch(e) { safeShowMsg('网络被风刮断了，稍后再试吧~'); }
          };

          submitBtn.onclick = sendMessage;
          inputField.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        };

        const bootAll = () => {
          try { initExplosion(); } catch(e){}
          try { initAudio(); } catch(e){}
          try { initOML2D(); } catch(e){}
          try { initAIAbs(); } catch(e){}
          try { initTagCloud(); } catch(e){}
          try { initGitHubCalendar(); } catch(e){}
        };

        window.addEventListener('load', bootAll);
        document.addEventListener('pjax:complete', () => { 
          try { initAIAbs(); } catch(e){} 
          try { initTagCloud(); } catch(e){}
          try { initGitHubCalendar(); } catch(e){}
        });
        setTimeout(bootAll, 800);
      </script>
