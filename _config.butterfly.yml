# 首页全屏大图
index_img: /img/bg.jpg

# 头像设置
avatar:
  img: /img/avatar.jpg

# 社交链接 (加上单引号防止 YAML 解析失败)
social:
  'fab fa-github': 'https://github.com/nomadpanda1 || GitHub'
  'fas fa-envelope': 'mailto:863088821@qq.com || Email'

# ==========================================
# 核心防墙设置：自定义 Fastly 极速节点，完美修复图标丢失
# ==========================================
CDN:
  internal_provider: custom
  third_party_provider: custom
  custom_format: 'https://fastly.jsdelivr.net/npm/${npm_name}@${version}/${file}'

# ==========================================
# 导航栏 (Menu)
# ==========================================
menu:
  '首页': '/ || fas fa-home'
  '归档': '/archives/ || fas fa-archive'
  '标签': '/tags/ || fas fa-tags'
  '分类': '/categories/ || fas fa-folder-open'
  '关于我': '/about/ || fas fa-heart'

# ==========================================
# 昼夜交替 (暗黑模式)
# ==========================================
darkmode:
  enable: true
  button: true
  autoChangeMode: 1

# ==========================================
# 极客美学：电磁粒子动态背景
# ==========================================
canvas_nest:
  enable: true
  color: '73,177,245'
  opacity: 0.7
  zIndex: -1
  count: 99

# ==========================================
# 主页打字机特效
# ==========================================
subtitle:
  enable: true
  effect: true
  timeStep: 50
  startDelay: 300
  loop: true
  sub:
    - 思考，编码，与世界交手
    - 去体验那种荒谬，去穷尽这毫无指望的一生。
    - 真正的救赎，并不是厮杀后的胜利，而是能在苦难之中找到生的力量和心的安宁。

# ==========================================
# 侧边栏公告板 (已剥离学校专业)
# ==========================================
card_announcement:
  enable: true
  content: 欢迎来到我的数字自留地！持续更新关于Web开发、自动化与荒诞派哲学的思考记录。

# ==========================================
# 评论系统
# ==========================================
comments:
  use: 
    - Giscus
  text: true
  lazyload: true

giscus:
  repo: nomadpanda1/lyf-blog
  repo_id: "R_kgDORd9rww"
  category: Announcements
  category_id: "DIC_kwDORd9rw84C3zdK"
  theme: light
  light_theme: light
  dark_theme: dark

# ==========================================
# 脚本注入 - 看板娘、音乐播放器、UI
# ==========================================
inject:
  head:
    - '<link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/aplayer/dist/APlayer.min.css">'
    - '<style>#chat-btn {position:fixed; bottom:30px; right:280px; z-index:9999; padding:10px 18px; background:#49b1f5; color:#fff; border-radius:30px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.1); font-size:14px; font-weight:bold; transition:all 0.3s;} #chat-btn:hover {background:#ff7242; transform:scale(1.05);} #chat-box {position:fixed; bottom:80px; right:280px; z-index:9998; background:rgba(255,255,255,0.85); padding:15px; border-radius:15px; box-shadow:0 8px 16px rgba(0,0,0,0.15); display:none; flex-direction:column; gap:10px; backdrop-filter:blur(10px); width:260px; border: 1px solid rgba(255,255,255,0.6);} #chat-input {width:100%; border:1px solid #ddd; padding:10px; border-radius:8px; outline:none; font-size:14px; box-sizing:border-box; background:rgba(255,255,255,0.9);} #chat-input:focus {border-color:#49b1f5;} #chat-submit {background:#49b1f5; color:white; border:none; padding:8px; border-radius:8px; cursor:pointer; font-weight:bold; transition:all 0.3s;} #chat-submit:hover {background:#ff7242;}</style>'
  bottom:
    - '<script src="https://fastly.jsdelivr.net/npm/aplayer/dist/APlayer.min.js"></script>'
    - '<script src="https://fastly.jsdelivr.net/npm/meting@2.0.1/dist/Meting.min.js"></script>'
    - '<meting-js server="netease" type="playlist" id="2388610191" fixed="true" mini="true" autoplay="false" loop="all" order="random" preload="auto" volume="0.5"></meting-js>'
    - |
      <script>
        const loadOML2D = () => {
          const oml2d = OML2D.loadOml2d({
            sayHello: false,
            libraryUrls: {
              cubism2: 'https://fastly.jsdelivr.net/gh/oh-my-live2d/oh-my-live2d@main/lib/live2d.min.js',
              cubism5: 'https://fastly.jsdelivr.net/gh/oh-my-live2d/oh-my-live2d@main/lib/live2dcubismcore.min.js'
            },
            models: [
              {
                path: 'https://fastly.jsdelivr.net/gh/Eikanya/Live2d-model@master/Live2D/Senko_Normals/senko.model3.json',
                position: [-50, 50],
                scale: 0.12,
                stageStyle: { width: 320 }
              }
            ],
            tips: {
              style: { width: '240px', minHeight: '70px', padding: '14px', fontSize: '14px', lineHeight: '1.6', wordBreak: 'break-word' },
              message: ['欢迎来到七月的峰の数字自留地！', '代码跑不通？不如去打把《战争雷霆》。', '推石头的西西弗斯，今天也要加油哦！']
            }
          });

          const chatBtn = document.createElement('div');
          chatBtn.id = 'chat-btn';
          chatBtn.innerText = '💬 呼叫仙狐大人';
          document.body.appendChild(chatBtn);

          const chatBox = document.createElement('div');
          chatBox.id = 'chat-box';
          chatBox.innerHTML = `<input type="text" id="chat-input" placeholder="想聊点什么？(按回车发送)" autocomplete="off"/><button id="chat-submit">发送电波 🚀</button>`;
          document.body.appendChild(chatBox);

          const inputField = document.getElementById('chat-input');
          const submitBtn = document.getElementById('chat-submit');

          const safeShowMsg = (msg) => {
            if (oml2d && oml2d.tipsMessage) oml2d.tipsMessage(msg, 10000, 10);
            else if (oml2d && oml2d.tips && oml2d.tips.showMessage) oml2d.tips.showMessage(msg, 10000, 10);
          };

          const speakText = (text) => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel(); 
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 1.15; 
            msg.pitch = 1.5; 
            const voices = window.speechSynthesis.getVoices();
            const loliVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Xiaoyi') || v.name.includes('晓伊') || v.name.includes('童') || v.name.includes('girl'))) 
                           || voices.find(v => v.lang.includes('zh') && (v.name.includes('Xiaoxiao') || v.name.includes('女') || v.name.includes('Female')));
            if (loliVoice) msg.voice = loliVoice;
            window.speechSynthesis.speak(msg);
          };

          window.speechSynthesis.getVoices();

          chatBtn.onclick = () => {
            if (chatBox.style.display === 'flex') chatBox.style.display = 'none';
            else { chatBox.style.display = 'flex'; inputField.focus(); }
          };

          const sendMessage = async () => {
            const userMsg = inputField.value.trim();
            if (!userMsg) return;
            inputField.value = '';
            chatBox.style.display = 'none';
            safeShowMsg('仙狐正在脑内运算中...🦊');
            try {
              const res = await fetch('https://senko-ai-proxy.htklyf123.workers.dev', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: userMsg })
              });
              const data = await res.json();
              if (data.reply) { safeShowMsg(data.reply); speakText(data.reply); } 
              else safeShowMsg('糟糕，脑电波被外星人拦截了...');
            } catch(e) { safeShowMsg('网络被风刮断了，稍后再试吧~'); }
          };

          submitBtn.onclick = sendMessage;
          inputField.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        };

        const script = document.createElement('script');
        script.src = 'https://fastly.jsdelivr.net/npm/oh-my-live2d/dist/index.min.js';
        script.onload = loadOML2D;
        document.body.appendChild(script);
      </script>
